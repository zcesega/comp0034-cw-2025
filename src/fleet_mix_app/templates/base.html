<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Fleet Mix Shift Inspector - {% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('main.index') }}">Fleet Mix Shift Inspector</a>
        <ul class="navbar-nav flex-row">
          <li class="nav-item me-3">
            <a class="nav-link" href="{{ url_for('main.comparison') }}">Fleet mix comparison</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('main.manufacturers') }}">Manufacturers</a>
          </li>
        </ul>
      </div>
    </nav>
    <main class="container mb-4">
      {% if error %}
        <div class="alert alert-warning" role="alert">
          {{ error }}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
